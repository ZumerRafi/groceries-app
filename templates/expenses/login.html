{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=20">

</head>

<body>

<div class="form-container">

    <div class="form-box">

        <h1>

            Welcome Back

        </h1>

        <br>

        <p
            style="
            color:#94a3b8;
            margin-bottom:30px;
            "
        >

            Login to continue managing expenses.

        </p>

        <form method="POST">

            {% csrf_token %}

            <input
                type="text"
                name="username"
                placeholder="Username"
                required
            >

            <br><br>

            <input
                type="password"
                name="password"
                placeholder="Password"
                required
            >

            <br><br>

            <button type="submit">

                Login

            </button>

        </form>

        <br><br>

        <p>

            Don't have an account?

            <a
                href="/signup/"
                style="
                color:#38bdf8;
                text-decoration:none;
                "
            >
                Create Account
            </a>

        </p>

    </div>

</div>

</body>

</html>
